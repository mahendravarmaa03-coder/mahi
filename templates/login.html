{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - RX Junk Food</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { background: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e1e1e; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 0 30px rgba(255,200,0,0.2); }
    h2 { color: #ffc800; text-align: center; margin-bottom: 30px; }
    label { color: #ccc; }
    .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; }
    .form-control:focus { border-color: #ffc800; box-shadow: none; background: #2a2a2a; color: #fff; }
    .btn-login { background: #ffc800; color: #000; font-weight: bold; width: 100%; padding: 10px; border: none; border-radius: 8px; }
    .btn-login:hover { background: #e6b400; }
    .links a { color: #ffc800; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>🍔 Login</h2>
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }} alert-dismissible">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
    <p class="text-center mt-3 links">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    <p class="text-center links"><a href="{% url 'home' %}">← Back to Home</a></p>
  </div>
</body>
</html>
