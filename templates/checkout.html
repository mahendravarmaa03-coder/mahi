{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - RX Junk Food</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: #111; color: #fff; }
    .navbar { background: #ffc800 !important; }
    .navbar-brand { color: #000 !important; font-weight: bold; }
    h2 { color: #ffc800; margin: 30px 0; }
    .checkout-card { background: #1e1e1e; border-radius: 12px; padding: 30px; }
    .form-control, .form-control:focus { background: #2a2a2a; border: 1px solid #444; color: #fff; }
    .form-control:focus { border-color: #ffc800; box-shadow: none; }
    label { color: #ccc; }
    .order-summary { background: #2a2a2a; border-radius: 10px; padding: 20px; }
    .order-summary h5 { color: #ffc800; border-bottom: 1px solid #444; padding-bottom: 10px; }
    .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; color: #ddd; }
    .total-row { display: flex; justify-content: space-between; padding: 12px 0; color: #ffc800; font-size: 18px; font-weight: bold; }
    .btn-order { background: #ffc800; color: #000; font-weight: bold; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; margin-top: 20px; }
    .btn-order:hover { background: #e6b400; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">🍔 RX Junk Food</a>
    </div>
  </nav>

  <div class="container py-4">
    <h2><i class="fa-solid fa-credit-card"></i> Checkout</h2>

    <div class="row">
      <!-- Delivery Details -->
      <div class="col-md-7">
        <div class="checkout-card">
          <h5 style="color: #ffc800; margin-bottom: 20px;">📍 Delivery Details</h5>
          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label>Full Name</label>
              <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
            </div>
            <div class="mb-3">
              <label>Phone Number *</label>
              <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number" required>
            </div>
            <div class="mb-3">
              <label>Delivery Address *</label>
              <textarea name="address" class="form-control" rows="4" placeholder="Enter full delivery address..." required></textarea>
            </div>
            <button type="submit" class="btn-order">
              <i class="fa-solid fa-bag-shopping"></i> Place Order Now
            </button>
          </form>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-md-5 mt-4 mt-md-0">
        <div class="order-summary">
          <h5>🧾 Order Summary</h5>
          {% for item in cart_items %}
            <div class="item-row">
              <span>{{ item.product.name }} × {{ item.quantity }}</span>
              <span>₹{{ item.get_subtotal }}</span>
            </div>
          {% endfor %}
          <div class="total-row">
            <span>Total</span>
            <span>₹{{ total }}</span>
          </div>
          <p style="color: #888; font-size: 13px; margin-top: 10px;">
            <i class="fa-solid fa-circle-check" style="color: #ffc800;"></i> Cash on Delivery available
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
